name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/kimih_app
            git fetch origin main
            git reset --hard origin/main

            DEST=~/domains/goodsessentialsllc.com/public_html/kimih
            APP_ABS_PATH="$(pwd)"

            if command -v rsync >/dev/null 2>&1; then
              rsync -a --exclude 'index.php' --exclude 'storage' ~/kimih_app/public/ "$DEST/"
            else
              find ~/kimih_app/public -mindepth 1 -maxdepth 1 ! -name index.php ! -name storage -exec cp -a {} "$DEST/" \;
            fi

            # Regenerate the subdomain's front controller every deploy so it can't
            # go missing (e.g. security-scanner quarantine) without self-healing.
            cat > "$DEST/index.php" <<'PHPEOF'
<?php

use Illuminate\Http\Request;

define('LARAVEL_START', microtime(true));

$appPath = '__APP_PATH__';

if (file_exists($maintenance = $appPath.'/storage/framework/maintenance.php')) {
    require $maintenance;
}

require $appPath.'/vendor/autoload.php';

(require_once $appPath.'/bootstrap/app.php')
    ->handleRequest(Request::capture());
PHPEOF
            sed -i "s#__APP_PATH__#$APP_ABS_PATH#" "$DEST/index.php"

            composer install --no-dev --optimize-autoloader --no-interaction --no-scripts
            php artisan package:discover --ansi
            php artisan migrate --force
            php artisan config:cache
            php artisan view:cache
            php artisan route:cache || true
            chmod -R 775 storage bootstrap/cache
