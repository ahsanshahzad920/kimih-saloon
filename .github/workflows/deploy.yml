name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose homepage 403
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- laravel.log tail ---"
            tail -n 120 ~/kimih_app/storage/logs/laravel.log 2>&1
            echo "--- direct curl to origin IP with Host header ---"
            curl -skv -H "Host: kimih.goodsessentialsllc.com" "https://127.0.0.1/" 2>&1 | tail -50
            echo "--- .htaccess in kimih webroot ---"
            cat ~/domains/goodsessentialsllc.com/public_html/kimih/.htaccess
            echo "--- permissions on index.php and .htaccess ---"
            ls -la ~/domains/goodsessentialsllc.com/public_html/kimih/index.php ~/domains/goodsessentialsllc.com/public_html/kimih/.htaccess
            echo "--- storage/bootstrap perms ---"
            ls -la ~/kimih_app/storage ~/kimih_app/bootstrap/cache | head -20
            echo "--- route:list (may fail, that's fine) ---"
            cd ~/kimih_app && php artisan route:list 2>&1 | head -20

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/kimih_app
            git fetch origin main
            git reset --hard origin/main

            DEST=~/domains/goodsessentialsllc.com/public_html/kimih
            if command -v rsync >/dev/null 2>&1; then
              rsync -a --exclude 'index.php' --exclude 'storage' ~/kimih_app/public/ "$DEST/"
            else
              find ~/kimih_app/public -mindepth 1 -maxdepth 1 ! -name index.php ! -name storage -exec cp -a {} "$DEST/" \;
            fi

            composer install --no-dev --optimize-autoloader --no-interaction --no-scripts
            php artisan package:discover --ansi
            php artisan migrate --force
            php artisan config:cache
            php artisan view:cache
            php artisan route:cache || true
            chmod -R 775 storage bootstrap/cache
