name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose document root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "HOME=$HOME"
            ls -la "$HOME"
            echo "--- looking for public_html dirs ---"
            find "$HOME" -maxdepth 4 -iname "public_html" 2>/dev/null | while read -r d; do
              echo "FOUND: $d"
              echo "  type: $(stat -c '%F' "$d" 2>/dev/null)"
              readlink -f "$d"
              ls -la "$d" | head -20
              echo "  landing-page.css present? $(test -f "$d/assets/css/landing-page.css" && echo yes || echo no)"
            done
            echo "--- kimih_app/public vs candidates ---"
            ls -la ~/kimih_app/public | head -20
            echo "--- inside goodsessentialsllc.com/public_html/kimih ---"
            ls -la ~/domains/goodsessentialsllc.com/public_html/kimih
            echo "landing-page.css present? $(test -f ~/domains/goodsessentialsllc.com/public_html/kimih/assets/css/landing-page.css && echo yes || echo no)"
            echo "--- index.php diff ---"
            diff ~/kimih_app/public/index.php ~/domains/goodsessentialsllc.com/public_html/kimih/index.php && echo "IDENTICAL" || echo "DIFFERENT (see above)"
            echo "--- htaccess diff ---"
            diff ~/kimih_app/public/.htaccess ~/domains/goodsessentialsllc.com/public_html/kimih/.htaccess && echo "IDENTICAL" || echo "DIFFERENT (see above)"
            echo "--- storage entry ---"
            ls -la ~/domains/goodsessentialsllc.com/public_html/kimih/storage 2>&1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/kimih_app
            git fetch origin main
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader --no-interaction --no-scripts
            php artisan package:discover --ansi
            php artisan migrate --force
            php artisan config:cache
            php artisan view:cache
            php artisan route:cache || true
            chmod -R 775 storage bootstrap/cache
