<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Store</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .product-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: box-shadow 0.3s;
        }
        .product-card:hover {
            box-shadow: 0 0 11px rgba(33,33,33,.2);
        }
        .product-img {
            max-height: 200px;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .product-price {
            font-size: 1.25rem;
            font-weight: bold;
        }
        .product-save {
            color: green;
        }
        .nav-tabs .nav-link {
            margin-right: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar bg-dark">
        <div class="container-fluid">
            <div class="d-flex justify-content-end w-100">
                <a class="fw-bolder text-white text-decoration-none" data-bs-toggle="offcanvas" href="#offcanvasExample" role="button" aria-controls="offcanvasExample"><i class="bi bi-cart"></i> Add To Cart</a>
            </div>
        </div>
    </nav>
    <div class="container my-4">
        <div class="text-center mb-4">
            <h1>Tonic Legends Barbershop Store</h1>
        </div>

        <ul class="nav nav-tabs justify-content-center" id="myTab" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" id="home-tab" data-toggle="tab" href="#home" role="tab" aria-controls="home" aria-selected="true">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="profile-tab" data-toggle="tab" href="#profile" role="tab" aria-controls="profile" aria-selected="false">Profile</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="contact-tab" data-toggle="tab" href="#contact" role="tab" aria-controls="contact" aria-selected="false">Contact</a>
            </li>
        </ul>

        <div class="tab-content" id="myTabContent">
            <div class="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
                <div class="row mt-5">
                    <div class="col-md-4 mb-4">
                        <div class="product-card">
                            <img src="https://via.placeholder.com/200" class="product-img" alt="Product 1">
                            <div class="product-price">AED 130.41 <span class="product-save">Save 10%</span></div>
                            <div>BBA Face Wash 120 ml</div>
                            <button class="btn btn-dark mt-3">Add to cart</button>
                        </div>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="product-card">
                            <img src="https://via.placeholder.com/200" class="product-img" alt="Product 2">
                            <div class="product-price">AED 108.67 <span class="product-save">Save 10%</span></div>
                            <div>BBA Finishing Pomade 100 ml</div>
                            <button class="btn btn-dark mt-3">Add to cart</button>
                        </div>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="product-card">
                            <img src="https://via.placeholder.com/200" class="product-img" alt="Product 3">
                            <div class="product-price">AED 162.54 <span class="product-save">Save 10%</span></div>
                            <div>BBA Men's Beard and Shave Oil 50 ml</div>
                            <button class="btn btn-dark mt-3">Add to cart</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="profile" role="tabpanel" aria-labelledby="profile-tab">
                <!-- Content for the Profile tab -->
                2
            </div>
            <div class="tab-pane fade" id="contact" role="tabpanel" aria-labelledby="contact-tab">
                <!-- Content for the Contact tab -->
                3
            </div>
        </div>










    </div>


    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
